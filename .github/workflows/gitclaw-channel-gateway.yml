name: GitClaw Channel Gateway

on:
  workflow_dispatch:
    inputs:
      channel:
        description: External channel name, such as telegram or slack
        required: true
      account_id:
        description: External channel account, bot, or workspace id
        required: true
      gateway_slot:
        description: Gateway lease slot for audit
        required: false
      lease_run_id:
        description: Optional bridge run id for deterministic tests
        required: false
      renew:
        description: Dispatch the next gateway run before this job exits
        required: false
        default: "false"
      renew_delay_seconds:
        description: Delay before renewal dispatch
        required: false
        default: "0"

concurrency:
  group: gitclaw-channel-gateway-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - id: gateway
        run: |
          set -euo pipefail
          channel="$(jq -r '.inputs.channel // ""' "$GITHUB_EVENT_PATH")"
          account_id="$(jq -r '.inputs.account_id // ""' "$GITHUB_EVENT_PATH")"
          gateway_slot="$(jq -r '.inputs.gateway_slot // ""' "$GITHUB_EVENT_PATH")"
          lease_run_id="$(jq -r '.inputs.lease_run_id // ""' "$GITHUB_EVENT_PATH")"
          renew="$(jq -r '.inputs.renew // "false"' "$GITHUB_EVENT_PATH")"
          if [[ -z "$lease_run_id" || "$lease_run_id" == "null" ]]; then
            lease_run_id="$GITHUB_RUN_ID"
          fi
          printf "::add-mask::%s\n" "$account_id"
          GITCLAW_CHANNEL="$channel" \
            GITCLAW_CHANNEL_ACCOUNT_ID="$account_id" \
            GITCLAW_CHANNEL_GATEWAY_SLOT="$gateway_slot" \
            GITCLAW_CHANNEL_GATEWAY_LEASE_RUN_ID="$lease_run_id" \
            GITCLAW_CHANNEL_GATEWAY_RENEW="$renew" \
            go run ./cmd/gitclaw channel-gateway --lease-run-id "$lease_run_id"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}

      - run: |
          set -euo pipefail
          channel="$(jq -r '.inputs.channel // ""' "$GITHUB_EVENT_PATH")"
          account_id="$(jq -r '.inputs.account_id // ""' "$GITHUB_EVENT_PATH")"
          delay="$(jq -r '.inputs.renew_delay_seconds // "0"' "$GITHUB_EVENT_PATH")"
          printf "::add-mask::%s\n" "$account_id"
          if ! [[ "$delay" =~ ^[0-9]+$ ]]; then
            echo "renew_delay_seconds must be a non-negative integer" >&2
            exit 1
          fi
          if [[ "$delay" -gt 300 ]]; then
            echo "renew_delay_seconds must be <= 300" >&2
            exit 1
          fi
          sleep "$delay"
          gh workflow run .github/workflows/gitclaw-channel-gateway.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f channel="$channel" \
            -f account_id="$account_id" \
            -f gateway_slot="$GITCLAW_CHANNEL_GATEWAY_SLOT" \
            -f renew="$GITCLAW_CHANNEL_GATEWAY_RENEW" \
            -f renew_delay_seconds="$delay"
        if: steps.gateway.outputs.renew == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITCLAW_CHANNEL_GATEWAY_SLOT: ${{ steps.gateway.outputs.gateway_slot }}
          GITCLAW_CHANNEL_GATEWAY_RENEW: ${{ steps.gateway.outputs.renew }}
