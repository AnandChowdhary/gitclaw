name: GitClaw Channel Ingest

on:
  workflow_dispatch:
    inputs:
      channel:
        description: External channel name, such as telegram or slack
        required: true
      thread_id:
        description: External channel thread or chat id
        required: true
      message_id:
        description: Stable external message id
        required: true
      author:
        description: External author identifier
        required: false
      body:
        description: Message body to mirror into GitHub
        required: true

concurrency:
  group: gitclaw-channel-ingest-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - id: ingest
        run: |
          set -euo pipefail
          channel="$(jq -r '.inputs.channel // ""' "$GITHUB_EVENT_PATH")"
          thread_id="$(jq -r '.inputs.thread_id // ""' "$GITHUB_EVENT_PATH")"
          message_id="$(jq -r '.inputs.message_id // ""' "$GITHUB_EVENT_PATH")"
          author="$(jq -r '.inputs.author // ""' "$GITHUB_EVENT_PATH")"
          body="$(jq -r '.inputs.body // ""' "$GITHUB_EVENT_PATH")"
          printf "::add-mask::%s\n" "$thread_id"
          printf "::add-mask::%s\n" "$message_id"
          GITCLAW_CHANNEL="$channel" \
            GITCLAW_CHANNEL_THREAD_ID="$thread_id" \
            GITCLAW_CHANNEL_MESSAGE_ID="$message_id" \
            GITCLAW_CHANNEL_AUTHOR="$author" \
            GITCLAW_CHANNEL_BODY="$body" \
            go run ./cmd/gitclaw channel-ingest
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}

      - run: |
          set -euo pipefail
          channel="$(jq -r '.inputs.channel // ""' "$GITHUB_EVENT_PATH")"
          message_id="$(jq -r '.inputs.message_id // ""' "$GITHUB_EVENT_PATH")"
          printf "::add-mask::%s\n" "$message_id"
          dispatch_id="${channel}-${message_id}"
          gh workflow run .github/workflows/gitclaw.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f issue_number="${GITCLAW_ISSUE_NUMBER}" \
            -f dispatch_id="$dispatch_id" \
            -f reason="channel-ingest:${channel}"
        if: steps.ingest.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITCLAW_ISSUE_NUMBER: ${{ steps.ingest.outputs.issue_number }}

      - run: echo "Duplicate channel message; GitClaw issue workflow dispatch skipped."
        if: steps.ingest.outputs.duplicate == 'true'
