name: GitClaw Channel State

on:
  workflow_dispatch:
    inputs:
      channel:
        description: External channel name, such as telegram or slack
        required: true
      account_id:
        description: External channel account, bot, or workspace id
        required: true
      offset:
        description: Provider offset, update id, cursor, or event id
        required: false
      lease_run_id:
        description: Optional bridge run id for audit
        required: false

concurrency:
  group: gitclaw-channel-state-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  state:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - id: state
        run: |
          set -euo pipefail
          channel="$(jq -r '.inputs.channel // ""' "$GITHUB_EVENT_PATH")"
          account_id="$(jq -r '.inputs.account_id // ""' "$GITHUB_EVENT_PATH")"
          offset="$(jq -r '.inputs.offset // ""' "$GITHUB_EVENT_PATH")"
          lease_run_id="$(jq -r '.inputs.lease_run_id // ""' "$GITHUB_EVENT_PATH")"
          if [[ -z "$lease_run_id" || "$lease_run_id" == "null" ]]; then
            lease_run_id="$GITHUB_RUN_ID"
          fi
          printf "::add-mask::%s\n" "$account_id"
          printf "::add-mask::%s\n" "$offset"
          GITCLAW_CHANNEL="$channel" \
            GITCLAW_CHANNEL_ACCOUNT_ID="$account_id" \
            GITCLAW_CHANNEL_OFFSET="$offset" \
            GITCLAW_CHANNEL_LEASE_RUN_ID="$lease_run_id" \
            go run ./cmd/gitclaw channel-state --lease-run-id "$lease_run_id"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
