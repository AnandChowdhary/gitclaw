name: GitClaw Proactive

on:
  workflow_dispatch:
    inputs:
      name:
        description: Proactive job name
        required: false
        default: repo-hygiene
      slot:
        description: Idempotency slot, defaults to current UTC date
        required: false
      prompt:
        description: Proactive instruction body
        required: false
      prompt_file:
        description: Optional prompt file path in the repository
        required: false
        default: .gitclaw/proactive/repo-hygiene.md
      not_before:
        description: Optional RFC3339 or YYYY-MM-DD due gate for reminder-style jobs
        required: false
  schedule:
    - cron: "23 8 * * 1"

concurrency:
  group: gitclaw-proactive-${{ github.event.inputs.name || 'repo-hygiene' }}
  cancel-in-progress: false

jobs:
  enqueue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - id: enqueue
        run: |
          set -euo pipefail
          export GITCLAW_PROACTIVE_NAME="${GITCLAW_PROACTIVE_NAME:-repo-hygiene}"
          export GITCLAW_PROACTIVE_PROMPT_FILE="${GITCLAW_PROACTIVE_PROMPT_FILE:-.gitclaw/proactive/repo-hygiene.md}"
          go run ./cmd/gitclaw proactive enqueue
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITCLAW_PROACTIVE_NAME: ${{ github.event.inputs.name }}
          GITCLAW_PROACTIVE_SLOT: ${{ github.event.inputs.slot }}
          GITCLAW_PROACTIVE_PROMPT: ${{ github.event.inputs.prompt }}
          GITCLAW_PROACTIVE_PROMPT_FILE: ${{ github.event.inputs.prompt_file }}
          GITCLAW_PROACTIVE_NOT_BEFORE: ${{ github.event.inputs.not_before }}

      - if: ${{ steps.enqueue.outputs.issue_number != '' && steps.enqueue.outputs.issue_number != '0' }}
        run: |
          set -euo pipefail
          dispatch_id="proactive-${GITCLAW_PROACTIVE_NAME}-${GITCLAW_PROACTIVE_SLOT}"
          gh workflow run .github/workflows/gitclaw.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f issue_number="${GITCLAW_ISSUE_NUMBER}" \
            -f dispatch_id="$dispatch_id" \
            -f reason="proactive:${GITCLAW_PROACTIVE_NAME}"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITCLAW_PROACTIVE_NAME: ${{ steps.enqueue.outputs.name }}
          GITCLAW_PROACTIVE_SLOT: ${{ steps.enqueue.outputs.slot }}
          GITCLAW_ISSUE_NUMBER: ${{ steps.enqueue.outputs.issue_number }}
