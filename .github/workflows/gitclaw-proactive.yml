name: GitClaw Proactive

on:
  workflow_dispatch:
    inputs:
      name:
        description: Proactive job name
        required: false
        default: repo-hygiene
      slot:
        description: Idempotency slot, defaults to current UTC date
        required: false
      prompt:
        description: Proactive instruction body
        required: false
      prompt_file:
        description: Optional prompt file path in the repository
        required: false
        default: .gitclaw/proactive/repo-hygiene.md
      not_before:
        description: Optional RFC3339 or YYYY-MM-DD due gate for reminder-style jobs
        required: false
      notify_routes:
        description: Optional comma-separated channel routes for a proactive notification
        required: false
  schedule:
    - cron: "23 8 * * 1"

concurrency:
  group: gitclaw-proactive-${{ github.event.inputs.name || 'repo-hygiene' }}
  cancel-in-progress: false

jobs:
  enqueue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - id: enqueue
        run: |
          set -euo pipefail
          input_name="$(jq -r '(.inputs // {}).name // ""' "$GITHUB_EVENT_PATH")"
          input_slot="$(jq -r '(.inputs // {}).slot // ""' "$GITHUB_EVENT_PATH")"
          input_prompt="$(jq -r '(.inputs // {}).prompt // ""' "$GITHUB_EVENT_PATH")"
          input_prompt_file="$(jq -r '(.inputs // {}).prompt_file // ""' "$GITHUB_EVENT_PATH")"
          input_not_before="$(jq -r '(.inputs // {}).not_before // ""' "$GITHUB_EVENT_PATH")"
          input_notify_routes="$(jq -r '(.inputs // {}).notify_routes // ""' "$GITHUB_EVENT_PATH")"
          export GITCLAW_PROACTIVE_NAME="${input_name:-repo-hygiene}"
          export GITCLAW_PROACTIVE_SLOT="$input_slot"
          if [[ -n "$input_prompt" ]]; then
            prompt_file="$RUNNER_TEMP/gitclaw-proactive-prompt.md"
            printf "%s" "$input_prompt" > "$prompt_file"
            export GITCLAW_PROACTIVE_PROMPT_FILE="$prompt_file"
          else
            export GITCLAW_PROACTIVE_PROMPT_FILE="${input_prompt_file:-.gitclaw/proactive/repo-hygiene.md}"
          fi
          export GITCLAW_PROACTIVE_NOT_BEFORE="$input_not_before"
          export GITCLAW_PROACTIVE_NOTIFY_ROUTES="$input_notify_routes"
          go run ./cmd/gitclaw proactive enqueue
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}

      - if: ${{ steps.enqueue.outputs.issue_number != '' && steps.enqueue.outputs.issue_number != '0' }}
        run: |
          set -euo pipefail
          dispatch_id="proactive-${GITCLAW_PROACTIVE_NAME}-${GITCLAW_PROACTIVE_SLOT}"
          gh workflow run .github/workflows/gitclaw.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f issue_number="${GITCLAW_ISSUE_NUMBER}" \
            -f dispatch_id="$dispatch_id" \
            -f reason="proactive:${GITCLAW_PROACTIVE_NAME}"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITCLAW_PROACTIVE_NAME: ${{ steps.enqueue.outputs.name }}
          GITCLAW_PROACTIVE_SLOT: ${{ steps.enqueue.outputs.slot }}
          GITCLAW_ISSUE_NUMBER: ${{ steps.enqueue.outputs.issue_number }}
