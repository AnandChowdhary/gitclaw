name: GitClaw Channel Delivery

on:
  workflow_dispatch:
    inputs:
      channel:
        description: External channel name, such as telegram or slack
        required: true
      account_id:
        description: External channel account, bot, or workspace id
        required: true
      issue_number:
        description: GitHub issue number containing the assistant reply
        required: true
      comment_id:
        description: GitHub assistant comment id that was delivered
        required: true
      external_message_id:
        description: Provider message id produced by the delivery
        required: true
      gateway_run_id:
        description: Optional bridge run id for audit
        required: false

concurrency:
  group: gitclaw-channel-delivery-${{ inputs.channel }}-${{ inputs.issue_number }}-${{ inputs.comment_id }}
  cancel-in-progress: false

jobs:
  delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - id: delivery
        run: |
          set -euo pipefail
          channel="$(jq -r '.inputs.channel // ""' "$GITHUB_EVENT_PATH")"
          account_id="$(jq -r '.inputs.account_id // ""' "$GITHUB_EVENT_PATH")"
          issue_number="$(jq -r '.inputs.issue_number // ""' "$GITHUB_EVENT_PATH")"
          comment_id="$(jq -r '.inputs.comment_id // ""' "$GITHUB_EVENT_PATH")"
          external_message_id="$(jq -r '.inputs.external_message_id // ""' "$GITHUB_EVENT_PATH")"
          gateway_run_id="$(jq -r '.inputs.gateway_run_id // ""' "$GITHUB_EVENT_PATH")"
          printf "::add-mask::%s\n" "$account_id"
          printf "::add-mask::%s\n" "$external_message_id"
          GITCLAW_CHANNEL="$channel" \
            GITCLAW_CHANNEL_ACCOUNT_ID="$account_id" \
            GITCLAW_CHANNEL_ISSUE_NUMBER="$issue_number" \
            GITCLAW_CHANNEL_COMMENT_ID="$comment_id" \
            GITCLAW_CHANNEL_EXTERNAL_MESSAGE_ID="$external_message_id" \
            GITCLAW_CHANNEL_GATEWAY_RUN_ID="$gateway_run_id" \
            go run ./cmd/gitclaw channel-delivery
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
