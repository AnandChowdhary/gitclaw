name: GitClaw

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

concurrency:
  group: gitclaw-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.preflight.outputs.allowed }}
      code: ${{ steps.preflight.outputs.code }}
      reason: ${{ steps.preflight.outputs.reason }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - id: preflight
        run: go run ./cmd/gitclaw preflight --event "$GITHUB_EVENT_PATH"

  handle:
    needs: preflight
    if: needs.preflight.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      models: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - run: |
          set -euo pipefail
          model="openai/gpt-5-mini"
          if [[ "${GITCLAW_E2E_INVALID_MODEL}" == "true" ]]; then
            model="openai/not-a-real-model-for-gitclaw-e2e"
          fi
          if [[ "${GITCLAW_PROMPT_ARTIFACT_ENABLED}" == "true" ]]; then
            export GITCLAW_PROMPT_ARTIFACT_PATH="${RUNNER_TEMP}/gitclaw-prompt-artifacts/prompt.md"
          fi
          GITCLAW_MODEL="$model" go run ./cmd/gitclaw handle --event "$GITHUB_EVENT_PATH"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITCLAW_E2E_INVALID_MODEL: ${{ contains(github.event.issue.labels.*.name, 'gitclaw:e2e-invalid-model') }}
          GITCLAW_PROMPT_ARTIFACT_ENABLED: ${{ contains(github.event.issue.labels.*.name, 'gitclaw:e2e-prompt-artifact') }}

      - if: always() && contains(github.event.issue.labels.*.name, 'gitclaw:e2e-prompt-artifact')
        uses: actions/upload-artifact@v4
        with:
          name: gitclaw-issue-${{ github.event.issue.number }}-run-${{ github.run_id }}-prompt
          path: ${{ runner.temp }}/gitclaw-prompt-artifacts/prompt.md
          if-no-files-found: error
          retention-days: 7

  backup:
    needs: [preflight, handle]
    if: needs.preflight.outputs.allowed == 'true' && needs.handle.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: read
    env:
      BACKUP_BRANCH: gitclaw-backups
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - id: export
        run: |
          set -euo pipefail
          backup_root="${RUNNER_TEMP}/gitclaw-backups"
          path="$(go run ./cmd/gitclaw backup --event "$GITHUB_EVENT_PATH" --out "$backup_root")"
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "root=$backup_root" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}

      - run: |
          set -euo pipefail
          backup_file="${{ steps.export.outputs.path }}"
          backup_root="${{ steps.export.outputs.root }}"
          backup_rel="${backup_file#${backup_root}/}"
          dest=".gitclaw/backups/${backup_rel}"
          worktree="${RUNNER_TEMP}/gitclaw-backup-worktree"

          mkdir -p "$worktree"
          cd "$worktree"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads origin "$BACKUP_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$BACKUP_BRANCH"
            git checkout -B "$BACKUP_BRANCH" "origin/$BACKUP_BRANCH"
          else
            git checkout --orphan "$BACKUP_BRANCH"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          mkdir -p "$(dirname "$dest")"
          cp "$backup_file" "$dest"
          git add "$dest"

          if git diff --cached --quiet; then
            echo "No backup changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Back up GitClaw issue #${{ github.event.issue.number }}"
          git push origin "HEAD:${BACKUP_BRANCH}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
