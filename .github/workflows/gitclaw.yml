name: GitClaw

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

concurrency:
  group: gitclaw-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.preflight.outputs.allowed }}
      code: ${{ steps.preflight.outputs.code }}
      reason: ${{ steps.preflight.outputs.reason }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - id: preflight
        run: go run ./cmd/gitclaw preflight --event "$GITHUB_EVENT_PATH"

  handle:
    needs: preflight
    if: needs.preflight.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      models: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - run: go run ./cmd/gitclaw handle --event "$GITHUB_EVENT_PATH"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITCLAW_MODEL: openai/gpt-5-mini
